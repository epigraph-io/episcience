name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: epigraph
          POSTGRES_PASSWORD: epigraph
          POSTGRES_DB: epigraph_dev_synthesis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SQLX_OFFLINE: "true"
      DATABASE_URL: postgres://epigraph:epigraph@localhost:5432/epigraph_dev_synthesis
      PGPASSWORD: epigraph
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2.8.1

      - name: Bootstrap test DB (upstream + episcience + synthesis migrations)
        run: |
          for f in migrations/upstream/*.sql migrations/[0-9]*.sql migrations/synthesis/*.sql; do
            echo "Applying $f..."
            psql -h localhost -U epigraph -d epigraph_dev_synthesis -f "$f" -v ON_ERROR_STOP=1
          done

      - name: Seed test fixtures (service agent + origami claims)
        run: psql -h localhost -U epigraph -d epigraph_dev_synthesis -f scripts/ci-seed.sql -v ON_ERROR_STOP=1

      - name: Build
        run: cargo build --workspace

      - name: Unit tests (episcience-core)
        run: cargo test -p episcience-core --lib

      - name: DB integration tests (episcience-db, serialized)
        run: cargo test -p episcience-db --tests -- --test-threads=1

      - name: API integration tests (episcience-api, serialized)
        run: cargo test -p episcience-api --tests -- --test-threads=1

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
